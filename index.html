<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Acceso Facial</title>
  <!-- Librerias -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image/dist/teachablemachine-image.min.js"></script>
  <style>
    body {
      font-family: "Times New Roman", 'Times New Roman', Times, serif;
      text-align: center;
      background-color: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    h1 { color: #333; }
    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }
    #probabilidades {
      margin-top: 20px;
      font-size: 16px;
      color: #555;
    }
    canvas {
      border: 5px solid #006699;
      border-radius: 20px;
      box-shadow: 0 0 15 rgba(0, 102, 153, 0.6);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Sistema de Acceso Facial</h1>
  <div id="status">Detectando rostro...</div>
  <div id="probabilidades"></div>
  <div id="webcam-container"></div>

  <script>
    const URL_FACE = "model_face/";   // Ruta al modelo facial
    let modelFace, webcam;

    async function initFace() {
      const modelURL = URL_FACE + "model.json";
      const metadataURL = URL_FACE + "metadata.json";

      // Cargar modelo facial
      modelFace = await tmImage.load(modelURL, metadataURL);

      // Configurar webcam
      webcam = new tmImage.Webcam(320, 240, true); // ancho, alto, espejo
      await webcam.setup(); // Solicita acceso a la cámara
      await webcam.play();

      // Insertar el canvas de la webcam en el contenedor
      document.getElementById("webcam-container").appendChild(webcam.canvas);

      window.requestAnimationFrame(loopFace);
    }

    async function loopFace() {
      webcam.update();
      await predictFace();
      window.requestAnimationFrame(loopFace);
    }

    async function predictFace() {
      const prediction = await modelFace.predict(webcam.canvas);
      let probText = "";

      prediction.forEach(p => {
        probText += `${p.className}: ${(p.probability * 100).toFixed(2)}%<br>`;
      });

      document.getElementById("probabilidades").innerHTML = probText;

      const autorizado = prediction.find(p => p.className === "Persona autorizada");
      const denegado = prediction.find(p => p.className === "Persona con acceso denegado");

      if (autorizado && autorizado.probability > 0.9) {
        document.getElementById("status").innerText = "Acceso concedido";
        // Redirigir al dashboard después de 2 segundos
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 2000);
      } else if (denegado && denegado.probability > 0.9) {
        document.getElementById("status").innerText = "Acceso denegado";
      } else {
        document.getElementById("status").innerText = "Detectando rostro...";
      }
    }

    initFace();
  </script>
</body>
</html>
